{% extends "mock_election/base_new.html" %}
{% load static %}

{% block extra_head %}
<style>
  /* ── User Guide Shell ──────────────────────────────────────────────────── */
  .ug-shell {
    display: flex;
    min-height: calc(100vh - 0px);
  }

  /* Left nav */
  .ug-nav {
    width: 210px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 28px 16px;
    border-right: 1px solid #e4e7ec;
    background: #ffffff;
  }

  .ug-nav-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 10px;
    padding: 0 8px;
  }

  .ug-nav-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: #4b5563;
    text-decoration: none;
    margin-bottom: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .ug-nav-link:hover {
    background: #f0f2f5;
    color: #111827;
    text-decoration: none;
  }

  .ug-nav-link.active {
    background: #e8f4f0;
    color: #005D40;
    font-weight: 600;
  }

  .ug-nav-link svg {
    flex-shrink: 0;
    opacity: 0.6;
  }

  .ug-nav-link.active svg {
    opacity: 1;
  }

  /* Main content */
  .ug-content {
    flex: 1;
    min-width: 0;
    padding: 40px 52px;
    max-width: 800px;
  }

  /* Section header */
  .ug-page-title {
    font-size: 22px;
    font-weight: 800;
    color: #111827;
    letter-spacing: -0.4px;
    margin: 0 0 4px;
    padding-bottom: 12px;
    border-bottom: 2px solid #005D40;
  }

  .ug-page-intro {
    font-size: 13.5px;
    color: #4b5563;
    line-height: 1.7;
    margin: 12px 0 28px;
  }

  /* Sub-sections */
  .ug-subsection {
    margin-bottom: 32px;
  }

  .ug-subsection-title {
    font-size: 14px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #e4e7ec;
  }

  .ug-h3 {
    font-size: 13px;
    font-weight: 700;
    color: #005D40;
    margin: 18px 0 8px;
  }

  /* Steps list */
  .ug-steps {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .ug-steps li {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 6px 0;
    font-size: 13.5px;
    color: #374151;
    line-height: 1.55;
  }

  .ug-step-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #005D40;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  /* Bullet list */
  .ug-bullets {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .ug-bullets li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 5px 0;
    font-size: 13.5px;
    color: #374151;
    line-height: 1.55;
  }

  .ug-bullet-dot {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #005D40;
    margin-top: 7px;
  }

  /* Note / callout */
  .ug-note {
    display: flex;
    gap: 10px;
    background: #e8f4f0;
    border-left: 3px solid #005D40;
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin: 14px 0;
    font-size: 13px;
    color: #111827;
    line-height: 1.6;
  }

  .ug-note-icon {
    font-size: 15px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  /* Table */
  .ug-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e4e7ec;
    margin: 12px 0 20px;
  }

  .ug-table th {
    background: #f0f2f5;
    color: #4b5563;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 14px;
    border-bottom: 2px solid #e4e7ec;
    text-align: left;
  }

  .ug-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #e4e7ec;
    color: #111827;
    vertical-align: top;
  }

  .ug-table tr:last-child td { border-bottom: none; }
  .ug-table tr:hover td { background: #f7f8fa; }

  .badge-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-gray { background: #f0f2f5; color: #6b7280; }
</style>
{% endblock %}

{% block content %}
<div class="ug-shell">

  <!-- ── Left nav ──────────────────────────────────────────────────────────── -->
  <nav class="ug-nav">
    <div class="ug-nav-title">User Guide</div>

    <a href="/user_docs/polls/" class="ug-nav-link {% block nav_polls %}{% endblock %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <line x1="9" y1="9" x2="15" y2="9"></line>
        <line x1="9" y1="12" x2="15" y2="12"></line>
        <line x1="9" y1="15" x2="13" y2="15"></line>
      </svg>
      Polls
    </a>

    <a href="/user_docs/allocations/" class="ug-nav-link {% block nav_allocations %}{% endblock %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
      Allocations
    </a>

    <a href="/user_docs/groups/" class="ug-nav-link {% block nav_groups %}{% endblock %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      Groups
    </a>

    <a href="/user_docs/mock-election/" class="ug-nav-link {% block nav_mock %}{% endblock %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"></polyline>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
      </svg>
      Mock Election
    </a>
  </nav>

  <!-- ── Page content ───────────────────────────────────────────────────────── -->
  <div class="ug-content">
    {% block ug_content %}{% endblock %}
  </div>

</div>
{% endblock %}
