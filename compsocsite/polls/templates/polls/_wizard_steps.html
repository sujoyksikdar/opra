<div style="display:flex; align-items:center; margin-bottom:28px;">

  <div style="display:flex; align-items:center; gap:8px;">
    <div style="width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
      background:{% if current >= 1 %}var(--green){% else %}var(--border){% endif %};
      color:{% if current >= 1 %}#fff{% else %}var(--text-muted){% endif %};">
      {% if current > 1 %}
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      {% else %}1{% endif %}
    </div>
    <span style="font-size:12px; font-weight:{% if current == 1 %}600{% else %}400{% endif %}; color:{% if current == 1 %}var(--text){% else %}var(--text-muted){% endif %};">Type &amp; Title</span>
  </div>

  <div style="flex:1; height:1.5px; background:{% if current > 1 %}var(--green){% else %}var(--border){% endif %}; margin:0 10px;"></div>

  <div style="display:flex; align-items:center; gap:8px;">
    <div style="width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
      background:{% if current >= 2 %}var(--green){% else %}var(--border){% endif %};
      color:{% if current >= 2 %}#fff{% else %}var(--text-muted){% endif %};">
      {% if current > 2 %}
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      {% else %}2{% endif %}
    </div>
    <span style="font-size:12px; font-weight:{% if current == 2 %}600{% else %}400{% endif %}; color:{% if current == 2 %}var(--text){% else %}var(--text-muted){% endif %};">Alternatives</span>
  </div>

  <div style="flex:1; height:1.5px; background:{% if current > 2 %}var(--green){% else %}var(--border){% endif %}; margin:0 10px;"></div>

  <div style="display:flex; align-items:center; gap:8px;">
    <div style="width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
      background:{% if current >= 3 %}var(--green){% else %}var(--border){% endif %};
      color:{% if current >= 3 %}#fff{% else %}var(--text-muted){% endif %};">
      {% if current > 3 %}
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      {% else %}3{% endif %}
    </div>
    <span style="font-size:12px; font-weight:{% if current == 3 %}600{% else %}400{% endif %}; color:{% if current == 3 %}var(--text){% else %}var(--text-muted){% endif %};">Invite Voters</span>
  </div>

  <div style="flex:1; height:1.5px; background:{% if current > 3 %}var(--green){% else %}var(--border){% endif %}; margin:0 10px;"></div>

  <div style="display:flex; align-items:center; gap:8px;">
    <div style="width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
      background:{% if current >= 4 %}var(--green){% else %}var(--border){% endif %};
      color:{% if current >= 4 %}#fff{% else %}var(--text-muted){% endif %};">4</div>
    <span style="font-size:12px; font-weight:{% if current == 4 %}600{% else %}400{% endif %}; color:{% if current == 4 %}var(--text){% else %}var(--text-muted){% endif %};">Settings</span>
  </div>

</div>
