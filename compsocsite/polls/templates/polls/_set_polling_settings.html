{% load poll_extra %}
<form method="post" action="{% url 'polls:setPollingSettings' question.id %}">
    {% csrf_token %}

    {% if question.question_type == 1 %}
    <!-- Regular poll -->
    <fieldset style="margin-bottom:20px; border:none; padding:0;">
        <label class="pi-label" for="pollpreferences">Algorithm</label>
        <select id="pollpreferences" name="pollpreferences" class="pi-input" style="max-width:340px;"
            {% if question.status != 1 %} disabled {% endif %}>
            {% for item in poll_algorithms %}
            <option value="{{ forloop.counter }}"
                {% if question.poll_algorithm == forloop.counter %} selected {% endif %}>
                {{ item }}
            </option>
            {% endfor %}
        </select>
    </fieldset>

    <fieldset style="margin-bottom:20px; border:none; padding:0;">
        <label class="pi-label">Visible Algorithms</label>
        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;" id="visible">
            {% for rule in poll_algorithms %}
            <label class="pi-ui-chip">
                <input type="checkbox" name="vr"
                    {% if question.poll_algorithm == forloop.counter %} disabled {% endif %}>
                {{ rule }}
            </label>
            {% endfor %}
        </div>
    </fieldset>

    {% elif question.question_type == 2 %}
    <!-- Allocation -->
    <fieldset style="margin-bottom:20px; border:none; padding:0;">
        <label class="pi-label" for="pollpreferences">Allocation Method</label>
        <select id="pollpreferences" name="pollpreferences" class="pi-input" style="max-width:340px;"
            {% if question.status != 1 %} disabled {% endif %}>
            {% for item in alloc_methods %}
            <option value="{{ forloop.counter }}"
                {% if question.poll_algorithm == forloop.counter %} selected {% endif %}>
                {{ item }}
            </option>
            {% endfor %}
        </select>
    </fieldset>

    <fieldset style="margin-bottom:20px; border:none; padding:0;">
        <label class="pi-label">Allocation Algorithms to Show in Results</label>
        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;">
            <label class="pi-ui-chip">
                <input id="round_robin_alloc" type="checkbox" value="1" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:1 != 0 %} checked {% endif %} disabled>
                Round Robin
            </label>
            <label class="pi-ui-chip">
                <input id="mnw_alloc" type="checkbox" value="2" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:2 != 0 %} checked {% endif %}>
                Max Nash Welfare
            </label>
            <label class="pi-ui-chip">
                <input id="market_alloc" type="checkbox" value="4" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:4 != 0 %} checked {% endif %}>
                Market (EF1)
            </label>
            <label class="pi-ui-chip">
                <input id="market_eq_alloc" type="checkbox" value="8" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:8 != 0 %} checked {% endif %}>
                MarketEQ (EQ1)
            </label>
            <label class="pi-ui-chip">
                <input id="leximin_alloc" type="checkbox" value="16" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:16 != 0 %} checked {% endif %}>
                Leximin
            </label>
            <label class="pi-ui-chip">
                <input id="mnw_bin_alloc" type="checkbox" value="32" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:32 != 0 %} checked {% endif %}>
                MNW Binary
            </label>
            <label class="pi-ui-chip">
                <input id="market_eq1_po_alloc" type="checkbox" value="64" name="alloc_algorithms"
                    {% if question.alloc_algorithms|bitwise_and:64 != 0 %} checked {% endif %}>
                Market EQ1 PO
            </label>
        </div>
    </fieldset>

    <fieldset style="margin-bottom:20px; border:none; padding:0;">
        <label class="pi-label">Information to Show in Results Page</label>

        <div style="margin-bottom:12px;">
            <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Preference View</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <label class="pi-ui-chip">
                    <input id="my_pref_table" type="checkbox" value="1" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:1 != 0 %} checked {% endif %}>
                    My Preferences
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="2" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:2 != 0 %} checked {% endif %}>
                    All Preferences
                </label>
            </div>
        </div>

        <div style="margin-bottom:12px;">
            <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Allocation View</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <label class="pi-ui-chip">
                    <input id="alloc_items_bundle_table" type="checkbox" value="4" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:4 != 0 %} checked {% endif %}>
                    Items Bundle
                </label>
                <label class="pi-ui-chip">
                    <input id="alloc_res_table" type="checkbox" value="8" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:8 != 0 %} checked {% endif %}>
                    Allocation Result Table
                </label>
            </div>
        </div>

        <div>
            <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Allocation Properties</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <label class="pi-ui-chip">
                    <input id="EF1_matrix" type="checkbox" value="16" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:16 != 0 %} checked {% endif %}>
                    Envy Matrix
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="32" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:32 != 0 %} checked {% endif %}>
                    Equitability
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="64" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:64 != 0 %} checked {% endif %}>
                    Fractional Share
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="128" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:128 != 0 %} checked {% endif %}>
                    Welfare
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="256" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:256 != 0 %} checked {% endif %}>
                    Pareto Optimality
                </label>
                <label class="pi-ui-chip">
                    <input type="checkbox" value="512" name="alloc_res_tables"
                        {% if selected_alloc_res_tables_sum|bitwise_and:512 != 0 %} checked {% endif %}>
                    First-choices
                </label>
            </div>
        </div>
    </fieldset>
    {% endif %}

    <script>
    $(document).ready(function() {
        {% if question.question_type == 1 %}
        var val = 0;
        var bools = {{ bools|default:"0" }};

        $("input[name='vr']").each(function () {
            var bitValue = Math.pow(2, val);
            $(this).val(bitValue).attr('value', bitValue);
            if (bools % 2 !== 0) {
                $(this).prop("checked", true);
            }
            bools = Math.floor(bools / 2);
            val += 1;
        });
        {% endif %}

        $('#pollpreferences').change(function () {
            $('input[name="vr"], input[name="alloc_algorithms"]').prop("disabled", false);
            var selectedVal = parseInt($('#pollpreferences option:selected').val(), 10);
            if (!isNaN(selectedVal)) {
                var changed = Math.pow(2, selectedVal - 1).toString();
                $('input[name="vr"], input[name="alloc_algorithms"]')
                    .filter(function() { return $(this).val() === changed; })
                    .prop("checked", true)
                    .prop("disabled", true);
            }
        });

        $('form').on('submit', function() {
            $('input[name="vr"], input[name="alloc_algorithms"]').prop("disabled", false);
        });
    });
    </script>

    <button type="submit" class="opra-btn opra-btn-primary">Save</button>
</form>
