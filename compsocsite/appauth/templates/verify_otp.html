{% extends 'base_auth.html' %}
{% block title %}Verify Email – OPRA{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Verify your email</h1>
  <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>

  {% if error %}
  <div class="auth-alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/verify-otp/">
    {% csrf_token %}
    <input type="hidden" name="uid" value="{{ uid }}">
    <div class="auth-field">
      <label class="auth-label" for="code">Verification Code</label>
      <input class="auth-input" id="code" name="code" type="text" maxlength="6"
        placeholder="000000" autofocus
        style="letter-spacing:0.2em; font-size:20px; text-align:center; font-weight:700;">
    </div>
    <button type="submit" class="auth-btn">Verify</button>
  </form>

  <form method="post" action="/auth/resend-otp/" style="margin-top:14px; text-align:center;">
    {% csrf_token %}
    <input type="hidden" name="uid" value="{{ uid }}">
    <button type="submit" style="background:none; border:none; font-size:12px; color:var(--green); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600;">
      Resend code
    </button>
  </form>
</div>
{% endblock %}
