{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OPRA{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/opra-design.css' %}">
  <link rel="shortcut icon" href="{% static 'img/oprasmalllogowhite.png' %}">
  <script src="{% static 'js/jquery-2.2.4.min.js' %}"></script>
  {% block extra_head %}{% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .auth-logo {
      margin-bottom: 28px;
      text-align: center;
    }
    .auth-logo img { height: 36px; }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 32px 36px;
    }
    .auth-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px;
      text-align: center;
    }
    .auth-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin: 0 0 24px;
    }
    .auth-field { margin-bottom: 14px; }
    .auth-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 5px;
    }
    .auth-input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--green); background: var(--surface); }
    .auth-error {
      font-size: 12px;
      color: var(--red);
      margin-bottom: 12px;
      text-align: center;
      min-height: 18px;
    }
    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .auth-btn:hover { background: var(--green-mid); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 18px;
    }
    .auth-link a { color: var(--green); text-decoration: none; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-alert-danger {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .auth-alert-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .auth-alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .auth-btn-ghost {
      width: 100%;
      padding: 10px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .auth-btn-ghost:hover { border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>

  <div class="auth-logo">
    <a href="/">
      <img src="{% static 'img/oprafulllogowhitenolink.png' %}" alt="OPRA">
    </a>
  </div>

  {% block content %}{% endblock %}

</body>
</html>
