{% extends 'polls/base.html' %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 40px 20px;">
  <h3 class="text-center">Log in with Code</h3>

   {% if error %}
    <div class="alert alert-danger" role="alert" style="margin-top: 10px;">
      {{ error }}
    </div>
    {% endif %}

  <form method="post" action="{% url 'appauth:login_with_code' %}">
    {% csrf_token %}
    <div class="form-group" style="margin-top: 16px;">
      <label for="code">Enter your code</label>
      <input id="code" name="code" type="text" class="form-control" placeholder="Login Code">
    </div>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
</div>
{% endblock %}
