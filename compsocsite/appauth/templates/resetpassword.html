{% extends 'base_auth.html' %}
{% block title %}Reset Password – OPRA{% endblock %}

{% block content %}
{% if key %}
<div class="auth-card">
  <h1 class="auth-title">Set a new password</h1>
  <p class="auth-subtitle">Choose a strong password for your account</p>

  <form method="post" action="{% url 'appauth:resetpassword' key %}">
    {% csrf_token %}
    <div class="auth-field">
      <label class="auth-label" for="newpassword">New Password</label>
      <input class="auth-input" type="password" name="newpassword" id="newpassword" placeholder="••••••••" autofocus>
    </div>
    <div class="auth-field">
      <label class="auth-label" for="confirmpassword">Confirm Password</label>
      <input class="auth-input" type="password" name="confirmpassword" id="confirmpassword" placeholder="••••••••">
    </div>
    <button type="submit" class="auth-btn">Reset Password</button>
  </form>
</div>
{% else %}
<div class="auth-card" style="text-align:center;">
  <p style="font-size:13px; color:var(--text-muted);">Invalid or expired reset link.</p>
  <a href="{% url 'appauth:forgetpasswordview' %}" class="auth-btn" style="display:inline-block; margin-top:12px; text-decoration:none;">Request a new link</a>
</div>
{% endif %}
{% endblock %}
