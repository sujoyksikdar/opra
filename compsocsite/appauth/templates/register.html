
{% extends 'polls/base.html' %}

{% block content %}
<script>
    function register(){
        if($('#reg_email').val() == ''){ 
            $('#error').html("Please enter an email."); 
            $('#reg_email').focus(); 
        }
        // else if($('#reg_username').val() == ''){ $('#error').html("Please enter a username."); $('#reg_username').focus(); }
        // else if($('#reg_username').val().indexOf('@') > -1){ $('#error').html("Username should not include @ character."); $('#reg_username').focus(); }
        else if($('#reg_password').val() == ''){ 
            $('#error').html("Please enter a password."); 
            $('#reg_password').focus(); 
        }
        else if($('#confirm_password').val() == ''){ 
            $('#error').html("Please confirm your password."); 
            $('#confirm_password').focus(); 
        }
        else if($('#reg_password').val() != $('#confirm_password').val()){ 
            $('#error').html("Password and Confirm Password are not matching."); 
            $('#reg_password').focus(); 
        }
        else{ 
            $('#user_form').submit(); 
        }
    }
</script>
<div class="container" style="max-width: 500px; margin-top: 50px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="text-center mb-4">Register with OPRA</h4>
            <div id="error" class="text-danger text-center mb-3"></div>

            <form id="user_form" method="post" action="{% url 'appauth:register' %}">
                {% csrf_token %}
                
                <div class="form-group mb-3">
                    <input type="email" class="form-control" id="reg_email" name="email" placeholder="Email">
                </div>

                <div class="form-group mb-3">
                    <input type="password" class="form-control" id="reg_password" name="password" placeholder="Password">
                </div>

                <div class="form-group mb-4">
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password">
                </div>

                <button type="button" class="btn btn-primary w-100" onclick="register()">Register</button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
