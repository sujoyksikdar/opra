{% extends 'base_auth.html' %}
{% block title %}Sign Up – OPRA{% endblock %}

{% block content %}

<div class="auth-card">
  <h1 class="auth-title">Create your account</h1>
  <p class="auth-subtitle">Join OPRA to start collecting preferences</p>

  <div class="auth-error" id="error"></div>

  <form id="user_form" method="post" action="{% url 'appauth:register' %}">
    {% csrf_token %}

    <div class="auth-field">
      <label class="auth-label" for="reg_email">Email <span style="color:var(--red);">*</span></label>
      <input class="auth-input" type="email" id="reg_email" name="email" placeholder="you@example.com" autofocus>
    </div>

    <div class="auth-field">
      <label class="auth-label" for="reg_password">Password <span style="color:var(--red);">*</span></label>
      <input class="auth-input" type="password" id="reg_password" name="password" placeholder="••••••••">
    </div>

    <div class="auth-field">
      <label class="auth-label" for="confirm_password">Confirm Password <span style="color:var(--red);">*</span></label>
      <input class="auth-input" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••">
    </div>

    <button type="button" class="auth-btn" onclick="register()">Create account</button>
  </form>
</div>

<div class="auth-link">
  Already have an account? <a href="{% url 'appauth:login' %}">Log in</a>
</div>

<script>
function register() {
  var email = $('#reg_email').val();
  var pw    = $('#reg_password').val();
  var cpw   = $('#confirm_password').val();
  if (!email) {
    $('#error').text('Please enter an email.'); $('#reg_email').focus(); return;
  }
  if (!pw) {
    $('#error').text('Please enter a password.'); $('#reg_password').focus(); return;
  }
  if (!cpw) {
    $('#error').text('Please confirm your password.'); $('#confirm_password').focus(); return;
  }
  if (pw !== cpw) {
    $('#error').text('Passwords do not match.'); $('#reg_password').focus(); return;
  }
  $('#user_form').submit();
}
</script>

{% endblock %}
