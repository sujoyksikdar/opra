{% load allocation_extra %}
<form method="post" action="{% url 'allocation:setPollingSettings' question.id %}">
  {% csrf_token %}

  <!-- Allocation Method dropdown -->
  <div style="margin-bottom:20px;">
    <label class="pi-label" for="pollpreferences">Allocation Method</label>
    <select id="pollpreferences" name="pollpreferences" class="pi-input"
      {% if question.status != 1 %}disabled{% endif %}>
      {% for item in alloc_methods %}
      <option value="{{ forloop.counter }}"
        {% if question.poll_algorithm == forloop.counter %}selected{% endif %}>
        {{ item }}
      </option>
      {% endfor %}
    </select>
  </div>

  <!-- Visible Allocation Algorithms -->
  <div style="margin-bottom:20px;">
    <label class="pi-label">Allocation Algorithms</label>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
      <label class="pi-ui-chip">
        <input type="checkbox" value="1" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:1 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 1 %}disabled{% endif %}>
        Round Robin
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="2" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:2 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 2 %}disabled{% endif %}>
        Max Nash Welfare
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="4" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:4 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 3 %}disabled{% endif %}>
        Market (EF1)
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="8" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:8 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 4 %}disabled{% endif %}>
        MarketEq (EQ1)
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="16" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:16 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 5 %}disabled{% endif %}>
        Leximin
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="32" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:32 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 6 %}disabled{% endif %}>
        MNW Binary
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="64" name="alloc_algorithms"
          {% if question.alloc_algorithms|bitwise_and:64 != 0 %}checked{% endif %}
          {% if question.poll_algorithm == 7 %}disabled{% endif %}>
        Market EQ1 PO
      </label>
    </div>
  </div>

  <!-- Results Tables -->
  <div style="margin-bottom:20px;">
    <label class="pi-label">Preference View</label>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
      <label class="pi-ui-chip">
        <input type="checkbox" value="1" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:1 != 0 %}checked{% endif %}>
        My Preferences
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="2" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:2 != 0 %}checked{% endif %}>
        All Preferences
      </label>
    </div>
  </div>

  <div style="margin-bottom:20px;">
    <label class="pi-label">Allocation View</label>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
      <label class="pi-ui-chip">
        <input type="checkbox" value="4" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:4 != 0 %}checked{% endif %}>
        Items Bundle
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="8" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:8 != 0 %}checked{% endif %}>
        Allocation Result Table
      </label>
    </div>
  </div>

  <div style="margin-bottom:24px;">
    <label class="pi-label">Allocation Properties</label>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
      <label class="pi-ui-chip">
        <input type="checkbox" value="16" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:16 != 0 %}checked{% endif %}>
        Envy Matrix
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="32" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:32 != 0 %}checked{% endif %}>
        Equitability
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="64" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:64 != 0 %}checked{% endif %}>
        Fractional Share
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="128" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:128 != 0 %}checked{% endif %}>
        Welfare
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="256" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:256 != 0 %}checked{% endif %}>
        Pareto Optimality
      </label>
      <label class="pi-ui-chip">
        <input type="checkbox" value="512" name="alloc_res_tables"
          {% if selected_alloc_res_tables_sum|bitwise_and:512 != 0 %}checked{% endif %}>
        First-choices
      </label>
    </div>
  </div>

  <button type="submit" class="opra-btn opra-btn-primary">Save</button>
</form>
