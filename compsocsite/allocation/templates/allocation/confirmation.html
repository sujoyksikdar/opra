{% extends 'allocation/base_new.html' %}
{% block title %}Preferences Submitted – OPRA{% endblock %}
{% block nav_allocation %}active{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh; padding:32px;">
  <div class="opra-card" style="max-width:440px; width:100%; padding:40px 36px; text-align:center;">
    <div style="width:52px; height:52px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 18px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h2 style="font-size:18px; font-weight:700; color:var(--text); margin:0 0 8px;">Preferences Submitted!</h2>
    <p style="font-size:13px; color:var(--text-muted); margin:0 0 28px;">Your preferences have been recorded successfully.</p>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a href="{% url 'allocation:detail' question.id %}" class="opra-btn opra-btn-ghost">Update Preferences</a>
      <a href="{% url 'allocation:allocation_tab' %}" class="opra-btn opra-btn-primary">Back to Allocations</a>
    </div>
  </div>
</div>
{% endblock %}
